services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: impact
      POSTGRES_PASSWORD: impact
      POSTGRES_DB: impact
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://impact:impact@db:5432/impact
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./assignmentInput:/assignmentInput:ro
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
